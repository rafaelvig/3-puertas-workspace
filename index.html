<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3 Puertas Workspace</title>
    <link rel="stylesheet" href="css/styles.css" />

</head>
<body>

  <header class="topbar">
    <div class="topbar-left">
      <div class="brand-mark" aria-hidden="true"></div>
      <div class="brand">
        <div class="brand-title">3 Puertas Workspace</div>
        <div class="brand-subtitle">Estrategia + Sistema Comercial</div>
      </div>
    </div>

    <div class="topbar-center">
      <div class="select-wrap">
        <label class="sr-only" for="selCompany">Empresa</label>
        <select id="selCompany"></select>
      </div>

      <div class="select-wrap">
        <label class="sr-only" for="selChannel">Canal</label>
        <select id="selChannel"></select>
      </div>
    </div>

    <div class="topbar-right">
      <div class="pill" id="sessionPill">Sesión: Local</div>
    </div>
  </header>
<section class="auth-box" id="authBox">
  <div class="auth-card">
    <h2>Ingresar al Workspace</h2>
    <input type="email" id="loginEmail" placeholder="Tu email" />
    <button id="btnMagicLink">Enviar link de acceso</button>
    <p id="authMsg"></p>
  </div>
</section>

<main class="shell" id="appShell" style="display:none;">
    <nav class="tabs" role="tablist" aria-label="Secciones">
      <button class="tab is-active" role="tab" aria-selected="true" data-tab="strategy">Estrategia</button>
      <button class="tab" role="tab" aria-selected="false" data-tab="system">Sistema Comercial</button>
    </nav>

    <section class="content">
      <div class="grid" id="cardsGrid"></div>
    </section>
  </main>

  <input
  type="email"
  id="loginEmail"
  placeholder="Tu email"
  autocomplete="email"
  autocapitalize="off"
  spellcheck="false"
/>

  <!-- Drawer (panel lateral) -->
  <aside class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer-backdrop" id="drawerBackdrop"></div>

    <div class="drawer-panel" role="dialog" aria-modal="true" aria-label="Detalle de bloque">
      <div class="drawer-header">
        <div>
          <div class="drawer-title" id="drawerTitle">Título</div>
          <div class="drawer-meta" id="drawerMeta">Empresa · Canal · Plano</div>
        </div>
        <button class="icon-btn" id="drawerClose" aria-label="Cerrar">✕</button>
      </div>

      <div class="drawer-body" id="drawerBody"></div>
    </div>
  </aside>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/config.js"></script>
<script src="js/app.js"></script>

  
</body>
</html>
