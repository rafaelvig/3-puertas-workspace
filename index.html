<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3 Puertas Workspace</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header class="topbar">
    <div class="topbar-left">
      <img src="img/logo-3puertas.svg" class="logo-main" alt="3 Puertas" />
      <div class="brand">
        <div class="brand-title">3 Puertas</div>
        <div class="brand-subtitle">Estrategia + Sistema Comercial</div>
      </div>
    </div>

    <div class="topbar-center">
      <div class="company-context">
        <img
          id="clientLogo"
          src="img/logo-monumento.svg"
          class="logo-client"
          alt="Cliente"
        />

        <div class="select-wrap">
          <label class="sr-only" for="selCompany">Empresa</label>
          <select id="selCompany"></select>
        </div>

        <div class="select-wrap">
          <label class="sr-only" for="selChannel">Canal</label>
          <select id="selChannel"></select>
        </div>
      </div>
    </div>

    <div class="topbar-right">
      <div class="pill" id="sessionPill">Sesión: sin iniciar</div>
      <button id="btnLogout" class="btn" type="button">Salir</button>
    </div>
  </header>

  <section class="auth-box" id="authBox">
    <div class="auth-card">
      <h2>Ingresar al Workspace</h2>

      <input
        type="email"
        id="loginEmail"
        placeholder="Tu email"
        autocomplete="email"
        autocapitalize="off"
        spellcheck="false"
        list="emailSuggestions"
      />
      <datalist id="emailSuggestions"></datalist>

      <button id="btnMagicLink" class="btn" type="button">Enviar link de acceso</button>
      <p id="authMsg"></p>
    </div>
  </section>

  <main class="shell" id="appShell" style="display:none;">
    <div id="workspaceProgress" class="workspace-progress"></div>

    <nav class="tabs" role="tablist" aria-label="Secciones">
      <button class="tab is-active" role="tab" aria-selected="true" data-tab="strategy">Estrategia</button>
      <button class="tab" role="tab" aria-selected="false" data-tab="system">Sistema Comercial</button>
    </nav>

    <div class="workspace-layout">
      <section class="workspace-main">
        <div id="cardsGrid" class="grid"></div>
      </section>

      <aside id="detailPanel" class="detail-panel">
        <div id="detailPanelInner" class="detail-panel-inner">
          <div class="detail-empty">Seleccioná un bloque para ver el detalle.</div>
        </div>
      </aside>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
