<!doctype html>
<html lang="es">

<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<title>Encuesta Droguería Monumento</title>

<link rel="stylesheet" href="css/styles.css"/>

</head>

<body>

<main class="wrap">

<!-- BIENVENIDA -->

<section id="welcomeScreen">

<h1>Estudio de Estructura Financiera del Canal Farmacéutico 2026</h1>

<p>
Su participación es confidencial y los datos serán utilizados únicamente
de forma agregada.
</p>

<p>
Al completar la encuesta participará de un sorteo.
</p>

<button id="btnStart">Comenzar</button>

</section>

<!-- LOGIN -->

<section id="loginScreen" style="display:none">

<h2>Ingrese su email</h2>

<input id="emailInput" type="email" placeholder="email@farmacia.com"/>

<button id="btnSendCode">
Enviar código
</button>

</section>

<!-- VERIFICACION -->

<section id="verifyScreen" style="display:none">

<h2>Ingrese el código recibido</h2>

<input id="otpInput" type="text" placeholder="Código"/>

<button id="btnVerifyCode">
Verificar
</button>

</section>

<!-- ENCUESTA -->

<section id="surveyScreen" style="display:none">

<div id="surveyApp"></div>

</section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>
<script src="js/config.js"></script>
<script src="js/cities_ar.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>

</body>
</html>
