<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Encuesta DM Farmacias</title>

  <link rel="stylesheet" href="css/styles.css" />

  <!-- SortableJS (para ranking drag & drop) -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>

<body>

  <main class="wrap">
    <header class="top">
      <h1>Estudio de Estructura Financiera del Canal Farmacéutico 2026</h1>
      <p class="sub">
        La información es confidencial y se utilizará de manera agregada y estadística.
      </p>
        <p class="time-estimate">
    Tiempo estimado de respuesta: 5 minutos
  </p>

      <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="progress-meta">
        <span id="progressText">0%</span>
        <span id="stepText">Pregunta 1 de 1</span>
      </div>
    </header>

    <section class="card" id="card">
      <!-- Render dinámico -->
    </section>

    <footer class="nav">
      <button class="btn" id="btnBack" type="button">Atrás</button>
      <button class="btn primary" id="btnNext" type="button">Siguiente</button>
    </footer>

    <pre class="debug" id="debug" style="display:none;"></pre>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/supabase.js"></script>
<script src="js/cities_ar.js"></script>
<script src="js/form-access.js"></script>
<script src="js/app.js"></script>
</body>
</html>
